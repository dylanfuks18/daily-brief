name: Fetch News

on:
  schedule:
    - cron: '0 */2 * * *'  # cada 2 horas — automatico, sin tocar nada
  workflow_dispatch:  # permite ejecutar manualmente

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser twikit

      - name: Fetch news
        run: python fetch_news.py
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}

      - name: Commit news.json and cookies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          [ -f twikit_cookies.json ] && git add twikit_cookies.json || true
          git diff --staged --quiet || git commit -m "chore: update news [skip ci]"
          git push
